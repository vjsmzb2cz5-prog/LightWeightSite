<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brothers & Sisters for Nikah</title>
<style>
body{font-family:Arial;margin:20px;background:#f4f4f4;}
h1{text-align:center;}
.controls{margin-bottom:20px;background:white;padding:15px;border-radius:8px;}
.profile{background:white;padding:15px;margin-bottom:15px;border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);opacity:0;transition:opacity 0.5s ease-in;}
.profile-header{font-weight:bold;margin-bottom:8px;}
button{margin-top:10px;padding:6px 10px;cursor:pointer;}
#loading{font-size:18px;text-align:center;padding:20px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.5;}}
/* Double slider CSS */
.age-slider-container {
  position: relative;
  height: 50px;
  margin-top: 10px;
}
.slider-track {
  position: absolute;
  height: 8px;
  border-radius: 5px;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  background: #dadae5;
}
.slider-range {
  position: absolute;
  height: 8px;
  border-radius: 5px;
  background: #2196F3;
  top: 50%;
  transform: translateY(-50%);
  left: 0;
  width: 0;
}
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 8px;
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: transparent;
  pointer-events: none; /* only thumbs clickable */
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  height: 20px;
  width: 20px;
  border-radius: 50%;
  background: #2196F3;
  cursor: pointer;
  pointer-events: auto;
  border: none;
  top: 50%;
  transform: translateY(-50%);
}
input[type="range"]::-moz-range-thumb {
  height: 20px;
  width: 20px;
  border-radius: 50%;
  background: #2196F3;
  cursor: pointer;
  border: none;
}
.age-range-display{margin-top:5px;}
</style>
</head>
<body>

<h1>Biodata Listings</h1>

<div class="controls">

Gender: 
<label><input type="radio" name="gender" value="all" checked onchange="renderProfiles()">All</label>
<label><input type="radio" name="gender" value="Brother/Male" onchange="renderProfiles()">Male / Brother</label>
<label><input type="radio" name="gender" value="Sister/Female" onchange="renderProfiles()">Female / Sister</label>

<br><br>

Age Range: <span id="ageDisplay">18 - 60</span>
<div class="age-slider-container">
  <div class="slider-track"></div>
  <div class="slider-range" id="sliderRange"></div>
  <input type="range" min="18" max="60" value="18" id="ageMin" oninput="updateAgeSlider()">
  <input type="range" min="18" max="60" value="60" id="ageMax" oninput="updateAgeSlider()">
</div>

<br><br>

Region: 
<label><input type="checkbox" class="regionFilter" value="USA" checked onchange="renderProfiles()">USA</label>
<label><input type="checkbox" class="regionFilter" value="Canada" checked onchange="renderProfiles()">Canada</label>
<label><input type="checkbox" class="regionFilter" value="Other" checked onchange="renderProfiles()">Other</label>

</div>

<div id="profiles">
  <div id="loading">✨ Loading biodata... ✨</div>
</div>

<script>
let profiles=[];

// Update slider and highlight
function updateAgeSlider(){
  const minSlider=document.getElementById("ageMin");
  const maxSlider=document.getElementById("ageMax");

  let min=parseInt(minSlider.value);
  let max=parseInt(maxSlider.value);

  // allow both thumbs to move independently but prevent overlap
  if(min > max) min = max;
  if(max < min) max = min;

  minSlider.value = min;
  maxSlider.value = max;

  document.getElementById("ageDisplay").innerText = min + " - " + max;

  // Update the blue range highlight
  const sliderRange=document.getElementById("sliderRange");
  const minPercent=(min-18)/(60-18)*100;
  const maxPercent=(max-18)/(60-18)*100;
  sliderRange.style.left = minPercent + "%";
  sliderRange.style.width = (maxPercent - minPercent) + "%";

  renderProfiles();
}

// Make phone numbers clickable
function makePhoneClickable(text){
  return text.replace(/(\+?\d[\d\s\-]{7,}\d)/g,function(phone){
    let clean = phone.replace(/\s+/g,"");
    return `<a href="tel:${clean}">${phone}</a>`;
  });
}

// Load profiles from Apps Script
async function loadProfiles(){
  const container=document.getElementById("profiles");
  container.innerHTML='<div id="loading">✨ Loading biodata... ✨</div>';
  try{
    const res=await fetch("https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrQBzUTQHAw-uuqYVH_cXclBCvQOj5bNiWqixgijj-yyMSE2XPyl9yDqPVrV-CKf9l-VNPsx2648I81zbWh0JnI2i7VyZ8qtKwCo1-Nbfw7vl0eFR-UrnW_qmip0pONDoUPU4Vxr0ByiFNjtKi2BnP9cLmgXflNc8RboLPWdTSDB6Rn9wH-HMwVPvTXZ4pLXBi52oi7IPwip4aZUPkdKS3fSVCEF26MMCXl8rMBKbPOHpgnX6dg9goG4d2CVCvr0uS_KDxxFMqJZKmD4kWTooToT9F1wbZdHW7lAWCjJ&lib=MXMheI6iOWxfrTeWdDiyZ-ViI8XQUcE2N"); // replace with your JSON
    const data=await res.json();
    profiles=data.filter(p=>p['Profile for'] && p['Age']).map(p=>{
      return {
        genderLabel:p['Profile for'].trim(),
        age:Number(p['Age']),
        region:p['Country of Residence'],
        bio:p['Profile/BioData']||"",
        time:new Date(p['Timestamp'])
      };
    });
    profiles.sort((a,b)=>b.time-a.time);
    updateAgeSlider();
  }catch(e){
    container.innerHTML="❌ Could not load profiles.";
    console.error(e);
  }
}

// Render profiles
function renderProfiles(){
  const genderFilter=document.querySelector('input[name="gender"]:checked').value;
  let minAge=parseInt(document.getElementById("ageMin").value);
  let maxAge=parseInt(document.getElementById("ageMax").value);
  if(minAge>maxAge)[minAge,maxAge]=[maxAge,minAge];
  const selectedRegions=Array.from(document.querySelectorAll(".regionFilter:checked")).map(cb=>cb.value);

  const container=document.getElementById("profiles");
  container.innerHTML="";
  let filteredCount=0;

  profiles.forEach(profile=>{
    if(genderFilter!=="all" && profile.genderLabel!==genderFilter) return;
    if(profile.age<minAge||profile.age>maxAge) return;
    if(selectedRegions.length>0&&!selectedRegions.includes(profile.region)) return;

    filteredCount++;
    const lines=profile.bio.split("\n");
    const preview=makePhoneClickable(lines.slice(0,5).join("<br>"));
    const full=makePhoneClickable(lines.join("<br>"));

    const div=document.createElement("div");
    div.className="profile";
    div.innerHTML=`<div class="profile-header">${profile.genderLabel} | Age: ${profile.age} | Region: ${profile.region}</div>
                   <div class="bio">${preview}</div><button>Read Full Biodata</button>`;

    const btn=div.querySelector("button");
    const bio=div.querySelector(".bio");
    let expanded=false;
    btn.onclick=()=>{ 
      if(!expanded){bio.innerHTML=full; btn.innerText="Show Less"; expanded=true;}
      else{bio.innerHTML=preview; btn.innerText="Read Full Biodata"; expanded=false;}
    };
    container.appendChild(div);
    setTimeout(()=>{div.style.opacity=1;},50);
  });

  if(filteredCount===0){
    container.innerHTML="<div id='loading'>No profiles match your filters.</div>";
  }
}

// Initial load
loadProfiles();
</script>
</body>
</html>
