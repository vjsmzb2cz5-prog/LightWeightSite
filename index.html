<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biodata Directory</title>

<style>
body{
font-family: Arial;
margin:20px;
background:#f5f5f5;
}

.profile{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
margin-top:10px;
padding:6px 10px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
}

.filters{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:8px;
}

a{
color:#007bff;
text-decoration:none;
}
</style>
</head>

<body>

<h2>Biodata Directory</h2>

<div class="filters">

Gender:
<select id="genderFilter">
<option value="all">All</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<br><br>

Age:
<input type="range" id="minAge" min="18" max="60" value="18">
<input type="range" id="maxAge" min="18" max="60" value="60">

<div>
Min: <span id="minAgeVal">18</span>
Max: <span id="maxAgeVal">60</span>
</div>

</div>

<div id="profiles"></div>

<script>

const profiles = [

{
age:25,
gender:"Male",
bio:`Name: Ahmed
Age: 25
Location: Chicago
Education: MBA
Height: 5'10
Family: Pakistani
Contact: 3125559876
Looking for educated partner`
},

{
age:23,
gender:"Female",
bio:`Name: Ayesha
Age: 23
Location: Dallas
Education: Doctor
Height: 5'4
Family: Pakistani
Contact: 4695551234
Practicing Muslim`
}

];

function linkPhones(text){
return text.replace(/(\+?\d[\d\s\-]{7,}\d)/g,'<a href="tel:$1">$1</a>');
}

function renderProfiles(){

const genderFilter = document.getElementById("genderFilter").value;
const minAge = parseInt(document.getElementById("minAge").value);
const maxAge = parseInt(document.getElementById("maxAge").value);

const container = document.getElementById("profiles");
container.innerHTML="";

profiles.forEach(profile=>{

if(genderFilter !== "all" && profile.gender !== genderFilter) return;
if(profile.age < minAge || profile.age > maxAge) return;

const lines = profile.bio.split("\n");

const preview = lines.slice(0,5).join("<br>");
const full = lines.join("<br>");

const div = document.createElement("div");
div.className="profile";

div.innerHTML = `
<div class="bio">${linkPhones(preview)}</div>
<button>Read Full Biodata</button>
`;

const btn = div.querySelector("button");
const bio = div.querySelector(".bio");

let expanded=false;

btn.onclick = () => {

if(!expanded){
bio.innerHTML = linkPhones(full);
btn.innerText="Show Less";
expanded=true;
}
else{
bio.innerHTML = linkPhones(preview);
btn.innerText="Read Full Biodata";
expanded=false;
}

};

container.appendChild(div);

});

}

document.getElementById("genderFilter").onchange = renderProfiles;

document.getElementById("minAge").oninput = ()=>{
document.getElementById("minAgeVal").innerText=document.getElementById("minAge").value;
renderProfiles();
};

document.getElementById("maxAge").oninput = ()=>{
document.getElementById("maxAgeVal").innerText=document.getElementById("maxAge").value;
renderProfiles();
};

renderProfiles();

</script>

</body>
</html>
