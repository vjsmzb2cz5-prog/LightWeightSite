<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profiles</title>
<style>
  body { font-family: Arial; padding: 20px; background:#f9f9f9; }
  .profile { border:1px solid #ccc; padding:10px; margin-bottom:10px; border-radius:5px; background:#fff; }
  .bio { white-space: pre-wrap; }
  .expand { color:blue; cursor:pointer; display:inline-block; margin-top:5px; }
  .loading { font-size: 18px; font-weight:bold; color: #555; }
  .filters { margin-bottom:20px; }
  label { margin-right:10px; }
</style>
</head>
<body>

<h2>Profiles</h2>
<div class="filters">
  Gender:
  <label><input type="radio" name="gender" value="all" checked>All</label>
  <label><input type="radio" name="gender" value="male">Male</label>
  <label><input type="radio" name="gender" value="female">Female</label>
  <br><br>
  Age: <span id="ageRange">0-100</span><br>
  <input type="range" id="ageSliderMin" min="0" max="100" value="0"> 
  <input type="range" id="ageSliderMax" min="0" max="100" value="100">
  <br><br>
  Region:
  <label><input type="checkbox" class="region" value="USA" checked>USA</label>
  <label><input type="checkbox" class="region" value="Canada" checked>Canada</label>
</div>

<div id="loading" class="loading">Loading profiles...</div>
<div id="profiles"></div>

<script>
let profiles = [];

function fetchProfiles() {
  fetch('YOUR_WEB_APP_URL_HERE') // replace with your Apps Script Web App URL
    .then(res => res.json())
    .then(data => {
      profiles = data;
      document.getElementById('loading').style.display = 'none';
      renderProfiles();
    })
    .catch(err => {
      document.getElementById('loading').textContent = "❌ Could not load profiles.";
      console.error(err);
    });
}

function renderProfiles() {
  const container = document.getElementById('profiles');
  container.innerHTML = '';

  const genderFilter = document.querySelector('input[name="gender"]:checked').value;
  const minAge = parseInt(document.getElementById('ageSliderMin').value);
  const maxAge = parseInt(document.getElementById('ageSliderMax').value);
  const regions = Array.from(document.querySelectorAll('.region:checked')).map(cb => cb.value);

  const filtered = profiles.filter(p => 
    (genderFilter==='all' || p.gender===genderFilter) &&
    p.age >= minAge && p.age <= maxAge &&
    regions.includes(p.region)
  );

  if(filtered.length===0){
    container.innerHTML = '<p>No profiles found.</p>';
    return;
  }

  filtered.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = 'profile';

    // Show first 5 lines
    const lines = p.bio.split('\n');
    const first5 = lines.slice(0,5).join('\n');

    const bioDiv = document.createElement('div');
    bioDiv.className = 'bio';
    bioDiv.textContent = first5;

    const expand = document.createElement('span');
    expand.className = 'expand';
    expand.textContent = 'Read More';
    expand.onclick = () => {
      if(bioDiv.textContent===first5){
        bioDiv.textContent = p.bio;
        expand.textContent = 'Show Less';
      } else {
        bioDiv.textContent = first5;
        expand.textContent = 'Read More';
      }
    };

    // Phone display / clickable
    const phoneDiv = document.createElement('div');
    if(p.phone){
      p.phone.split(',').forEach(ph=>{
        const a = document.createElement('a');
        a.href = 'tel:'+ph.replace(/\D/g,'');
        a.textContent = ph.trim();
        a.style.display = 'block';
        phoneDiv.appendChild(a);
      });
    }

    div.appendChild(bioDiv);
    div.appendChild(expand);
    div.appendChild(phoneDiv);
    container.appendChild(div);
  });
}

// --- Event listeners ---
document.querySelectorAll('input[name="gender"]').forEach(r => r.onchange = renderProfiles);
document.getElementById('ageSliderMin').oninput = () => {
  const maxSlider = document.getElementById('ageSliderMax');
  if(parseInt(maxSlider.value) < parseInt(document.getElementById('ageSliderMin').value)){
    maxSlider.value = document.getElementById('ageSliderMin').value;
  }
  document.getElementById('ageRange').textContent = `${document.getElementById('ageSliderMin').value}-${maxSlider.value}`;
  renderProfiles();
};
document.getElementById('ageSliderMax').oninput = () => {
  const minSlider = document.getElementById('ageSliderMin');
  if(parseInt(minSlider.value) > parseInt(document.getElementById('ageSliderMax').value)){
    minSlider.value = document.getElementById('ageSliderMax').value;
  }
  document.getElementById('ageRange').textContent = `${minSlider.value}-${document.getElementById('ageSliderMax').value}`;
  renderProfiles();
};
document.querySelectorAll('.region').forEach(cb => cb.onchange = renderProfiles);

// --- Initial fetch ---
fetchProfiles();
</script>
</body>
</html>
