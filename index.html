<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biodata List</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

.controls{
margin-bottom:20px;
background:white;
padding:15px;
border-radius:8px;
}

.profile{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
margin-top:10px;
padding:6px 10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Biodata Listings</h1>

<div class="controls">

Gender:

<select id="genderFilter" onchange="renderProfiles()">
<option value="all">All</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<br><br>

Age Range:

<input type="range" id="minAge" min="18" max="60" value="18" oninput="updateAge()">

<input type="range" id="maxAge" min="18" max="60" value="60" oninput="updateAge()">

<span id="ageDisplay">18 - 60</span>

</div>

<div id="profiles"></div>

<script>

let profiles = [];

async function loadProfiles(){

const res = await fetch("https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrQvDGyPGmb_stXhG2i9ZY17A_m0nAOaSIjIgZBSrwTdbQqBYiN55swc3QF1my7HyZNHNpe2OjcFIepgMxX7uedD-ZxHL34uZwkLKBLpfOv6iBGMfUj5wDsgLDR9RGmNqNZVkB8UoV92Xs5-u2KKfspoKZRXrpm2yXt3hh1LYEwzps-z2BDLzUvoE2_NfeuzlCL4yT4I4PcT71Zn5dZDl756Br61NVW6tOVqXjufo8Ihmv-jlroe7f0fhzaSDgGjMwMJ26Qulm8Z4ZUYl6MAmT66onzB-Tew4ZXAE_RW&lib=MXMheI6iOWxfrTeWdDiyZ-ViI8XQUcE2N");

profiles = await res.json();

renderProfiles();

}

function updateAge(){

let min = document.getElementById("minAge").value;
let max = document.getElementById("maxAge").value;

if(parseInt(min) > parseInt(max)){
[max,min] = [min,max];
}

document.getElementById("ageDisplay").innerText = min + " - " + max;

renderProfiles();

}

function makePhoneClickable(text){

return text.replace(/(\+?\d[\d\s\-]{7,}\d)/g,function(phone){
let clean = phone.replace(/\s+/g,"");
return `<a href="tel:${clean}">${phone}</a>`;
});

}

function renderProfiles(){

const genderFilter = document.getElementById("genderFilter").value;

let minAge = parseInt(document.getElementById("minAge").value);
let maxAge = parseInt(document.getElementById("maxAge").value);

if(minAge > maxAge){
[minAge,maxAge] = [maxAge,minAge];
}

const container = document.getElementById("profiles");

container.innerHTML="";

profiles.forEach(profile=>{

if(genderFilter !== "all" && profile.gender !== genderFilter) return;

if(profile.age < minAge || profile.age > maxAge) return;

const lines = profile.bio.split("\n");

const preview = makePhoneClickable(lines.slice(0,5).join("<br>"));
const full = makePhoneClickable(lines.join("<br>"));

const div = document.createElement("div");

div.className="profile";

div.innerHTML=`
<div class="bio">${preview}</div>
<button>Read Full Biodata</button>
`;

const btn = div.querySelector("button");
const bio = div.querySelector(".bio");

let expanded=false;

btn.onclick = ()=>{

if(!expanded){
bio.innerHTML = full;
btn.innerText = "Show Less";
expanded=true;
}
else{
bio.innerHTML = preview;
btn.innerText = "Read Full Biodata";
expanded=false;
}

};

container.appendChild(div);

});

}

loadProfiles();

</script>

</body>
</html>
